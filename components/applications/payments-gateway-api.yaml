apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-gateway
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/alex-bartleynees/payments-gateway.git
      path: deployment/helm-charts/payments-gateway
      targetRevision: HEAD
      helm:
        valueFiles:
          - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: payments-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
